naftiko: "1.0.0-alpha1"

info:
  label: Aladdin Graph API
  description: >-
    Shared capability definition for the Aladdin Graph API providing portfolio
    data, positions, risk analytics, and security reference data.
  tags:
    - Aladdin Studio
    - Portfolio Management
    - Risk Analytics
    - Financial
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ALADDIN_API_TOKEN: ALADDIN_API_TOKEN
      ALADDIN_API_BASE_URL: ALADDIN_API_BASE_URL

capability:
  consumes:
    - type: http
      namespace: aladdin-graph
      baseUri: "https://api.blackrock.com/v1"
      description: Aladdin Graph API for portfolio and risk data
      authentication:
        type: bearer
        token: "{{env.ALADDIN_API_TOKEN}}"
      resources:
        - name: portfolios
          path: /portfolios
          description: Portfolio management operations
          operations:
            - name: list-portfolios
              method: GET
              description: List portfolios accessible to the authenticated user
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: Results per page
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-portfolio
              method: GET
              description: Get portfolio details by ID
              inputParameters:
                - name: portfolioId
                  in: path
                  type: string
                  required: true
                  description: Portfolio identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: positions
          path: /portfolios/{portfolioId}/positions
          description: Portfolio position data
          operations:
            - name: get-positions
              method: GET
              description: Get current positions for a portfolio
              inputParameters:
                - name: portfolioId
                  in: path
                  type: string
                  required: true
                  description: Portfolio identifier
                - name: asOfDate
                  in: query
                  type: string
                  required: false
                  description: Position date (YYYY-MM-DD)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: risk
          path: /portfolios/{portfolioId}/risk
          description: Portfolio risk analytics
          operations:
            - name: get-risk
              method: GET
              description: Get risk analytics for a portfolio
              inputParameters:
                - name: portfolioId
                  in: path
                  type: string
                  required: true
                  description: Portfolio identifier
                - name: asOfDate
                  in: query
                  type: string
                  required: false
                  description: Risk calculation date
                - name: model
                  in: query
                  type: string
                  required: false
                  description: Risk model identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: securities
          path: /securities/{securityId}
          description: Security reference data
          operations:
            - name: get-security
              method: GET
              description: Get security reference data
              inputParameters:
                - name: securityId
                  in: path
                  type: string
                  required: true
                  description: Security identifier
                - name: idType
                  in: query
                  type: string
                  required: false
                  description: Identifier type (ISIN, CUSIP, etc.)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: aladdin-graph-api
      resources:
        - path: /v1/portfolios
          name: portfolios
          description: Portfolio data access
          operations:
            - method: GET
              name: list-portfolios
              description: List accessible portfolios
              call: "aladdin-graph.list-portfolios"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: aladdin-graph-mcp
      transport: http
      tools:
        - name: list-portfolios
          description: List Aladdin portfolios accessible to the authenticated user
          hints:
            readOnly: true
            openWorld: false
          call: "aladdin-graph.list-portfolios"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-portfolio
          description: Get details for a specific Aladdin portfolio
          hints:
            readOnly: true
            openWorld: false
          call: "aladdin-graph.get-portfolio"
          with:
            portfolioId: "tools.portfolioId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-portfolio-positions
          description: Get current positions and holdings for a portfolio
          hints:
            readOnly: true
            openWorld: false
          call: "aladdin-graph.get-positions"
          with:
            portfolioId: "tools.portfolioId"
            asOfDate: "tools.asOfDate"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-portfolio-risk
          description: Get risk analytics including tracking error, VaR, and factor exposures
          hints:
            readOnly: true
            openWorld: false
          call: "aladdin-graph.get-risk"
          with:
            portfolioId: "tools.portfolioId"
            asOfDate: "tools.asOfDate"
            model: "tools.model"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-security
          description: Get security reference data from Aladdin
          hints:
            readOnly: true
            openWorld: false
          call: "aladdin-graph.get-security"
          with:
            securityId: "tools.securityId"
            idType: "tools.idType"
          outputParameters:
            - type: object
              mapping: "$."
