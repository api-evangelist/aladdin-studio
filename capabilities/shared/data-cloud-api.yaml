naftiko: "1.0.0-alpha1"

info:
  label: Aladdin Data Cloud API
  description: >-
    Shared capability definition for the Aladdin Data Cloud API providing
    Snowflake-based analytics data warehousing access for large-scale
    portfolio analytics and data science workflows.
  tags:
    - Aladdin Studio
    - Data Cloud
    - Snowflake
    - Analytics
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ALADDIN_ADC_TOKEN: ALADDIN_ADC_TOKEN

capability:
  consumes:
    - type: http
      namespace: aladdin-data-cloud
      baseUri: "https://api.blackrock.com/adc/v1"
      description: Aladdin Data Cloud API for Snowflake-based analytics
      authentication:
        type: bearer
        token: "{{env.ALADDIN_ADC_TOKEN}}"
      resources:
        - name: connections
          path: /connections
          description: Data Cloud connection management
          operations:
            - name: list-connections
              method: GET
              description: List available Data Cloud connections
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: queries
          path: /connections/{connectionId}/query
          description: SQL query execution
          operations:
            - name: execute-query
              method: POST
              description: Execute SQL query against Data Cloud
              inputParameters:
                - name: connectionId
                  in: path
                  type: string
                  required: true
                  description: Connection identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  sql: "{{tools.sql}}"
                  warehouse: "{{tools.warehouse}}"
        - name: datasets
          path: /connections/{connectionId}/datasets
          description: Available datasets discovery
          operations:
            - name: list-datasets
              method: GET
              description: List available datasets in the Data Cloud
              inputParameters:
                - name: connectionId
                  in: path
                  type: string
                  required: true
                  description: Connection identifier
                - name: schema
                  in: query
                  type: string
                  required: false
                  description: Snowflake schema filter
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: aladdin-data-cloud-api
      resources:
        - path: /v1/connections
          name: connections
          description: Data Cloud connections
          operations:
            - method: GET
              name: list-connections
              description: List available Data Cloud connections
              call: "aladdin-data-cloud.list-connections"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: aladdin-data-cloud-mcp
      transport: http
      tools:
        - name: list-data-cloud-connections
          description: List available Aladdin Data Cloud Snowflake connections
          hints:
            readOnly: true
            openWorld: false
          call: "aladdin-data-cloud.list-connections"
          outputParameters:
            - type: object
              mapping: "$."
        - name: execute-data-cloud-query
          description: Execute SQL query against Aladdin Data Cloud datasets
          hints:
            readOnly: true
            openWorld: true
          call: "aladdin-data-cloud.execute-query"
          with:
            connectionId: "tools.connectionId"
            sql: "tools.sql"
            warehouse: "tools.warehouse"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-data-cloud-datasets
          description: List available datasets and tables in the Aladdin Data Cloud
          hints:
            readOnly: true
            openWorld: false
          call: "aladdin-data-cloud.list-datasets"
          with:
            connectionId: "tools.connectionId"
            schema: "tools.schema"
          outputParameters:
            - type: object
              mapping: "$."
