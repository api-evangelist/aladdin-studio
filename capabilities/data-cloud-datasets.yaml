naftiko: 1.0.0-alpha2
info:
  label: Aladdin Data Cloud API — Datasets
  description: 'Aladdin Data Cloud API — Datasets. 1 operations. Lead operation: Aladdin Studio List Available Datasets. Self-contained
    Naftiko capability covering one Aladdin Studio business surface.'
  tags:
  - Aladdin Studio
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALADDIN_STUDIO_API_KEY: ALADDIN_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-cloud-datasets
    baseUri: https://api.blackrock.com/adc/v1
    description: Aladdin Data Cloud API — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: connections-connectionId-datasets
      path: /connections/{connectionId}/datasets
      operations:
      - name: listdatasets
        method: GET
        description: Aladdin Studio List Available Datasets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connectionId
          in: path
          type: string
          description: Data Cloud connection identifier
          required: true
        - name: schema
          in: query
          type: string
          description: Snowflake schema to filter datasets
    authentication:
      type: bearer
      token: '{{env.ALADDIN_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-cloud-datasets-rest
    port: 8080
    description: REST adapter for Aladdin Data Cloud API — Datasets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/connections/{connectionid}/datasets
      name: connections-connectionid-datasets
      description: REST surface for connections-connectionId-datasets.
      operations:
      - method: GET
        name: listdatasets
        description: Aladdin Studio List Available Datasets
        call: data-cloud-datasets.listdatasets
        with:
          connectionId: rest.connectionId
          schema: rest.schema
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-cloud-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aladdin Data Cloud API — Datasets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: aladdin-studio-list-available-datasets
      description: Aladdin Studio List Available Datasets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-cloud-datasets.listdatasets
      with:
        connectionId: tools.connectionId
        schema: tools.schema
      outputParameters:
      - type: object
        mapping: $.
