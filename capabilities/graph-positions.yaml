naftiko: 1.0.0-alpha2
info:
  label: Aladdin Graph API — Positions
  description: 'Aladdin Graph API — Positions. 1 operations. Lead operation: Aladdin Studio Get Portfolio Positions. Self-contained
    Naftiko capability covering one Aladdin Studio business surface.'
  tags:
  - Aladdin Studio
  - Positions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALADDIN_STUDIO_API_KEY: ALADDIN_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: graph-positions
    baseUri: https://api.blackrock.com/v1
    description: Aladdin Graph API — Positions business capability. Self-contained, no shared references.
    resources:
    - name: portfolios-portfolioId-positions
      path: /portfolios/{portfolioId}/positions
      operations:
      - name: getportfoliopositions
        method: GET
        description: Aladdin Studio Get Portfolio Positions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: portfolioId
          in: path
          type: string
          description: Unique portfolio identifier
          required: true
        - name: asOfDate
          in: query
          type: string
          description: Position date in YYYY-MM-DD format
    authentication:
      type: bearer
      token: '{{env.ALADDIN_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: graph-positions-rest
    port: 8080
    description: REST adapter for Aladdin Graph API — Positions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/portfolios/{portfolioid}/positions
      name: portfolios-portfolioid-positions
      description: REST surface for portfolios-portfolioId-positions.
      operations:
      - method: GET
        name: getportfoliopositions
        description: Aladdin Studio Get Portfolio Positions
        call: graph-positions.getportfoliopositions
        with:
          portfolioId: rest.portfolioId
          asOfDate: rest.asOfDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: graph-positions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aladdin Graph API — Positions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: aladdin-studio-get-portfolio-positions
      description: Aladdin Studio Get Portfolio Positions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-positions.getportfoliopositions
      with:
        portfolioId: tools.portfolioId
        asOfDate: tools.asOfDate
      outputParameters:
      - type: object
        mapping: $.
