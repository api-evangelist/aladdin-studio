naftiko: 1.0.0-alpha2
info:
  label: Aladdin Data Cloud API — Connections
  description: 'Aladdin Data Cloud API — Connections. 1 operations. Lead operation: Aladdin Studio List Data Cloud Connections.
    Self-contained Naftiko capability covering one Aladdin Studio business surface.'
  tags:
  - Aladdin Studio
  - Connections
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALADDIN_STUDIO_API_KEY: ALADDIN_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-cloud-connections
    baseUri: https://api.blackrock.com/adc/v1
    description: Aladdin Data Cloud API — Connections business capability. Self-contained, no shared references.
    resources:
    - name: connections
      path: /connections
      operations:
      - name: listconnections
        method: GET
        description: Aladdin Studio List Data Cloud Connections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ALADDIN_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-cloud-connections-rest
    port: 8080
    description: REST adapter for Aladdin Data Cloud API — Connections. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/connections
      name: connections
      description: REST surface for connections.
      operations:
      - method: GET
        name: listconnections
        description: Aladdin Studio List Data Cloud Connections
        call: data-cloud-connections.listconnections
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-cloud-connections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aladdin Data Cloud API — Connections. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: aladdin-studio-list-data-cloud
      description: Aladdin Studio List Data Cloud Connections
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-cloud-connections.listconnections
      outputParameters:
      - type: object
        mapping: $.
