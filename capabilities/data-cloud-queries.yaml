naftiko: 1.0.0-alpha2
info:
  label: Aladdin Data Cloud API — Queries
  description: 'Aladdin Data Cloud API — Queries. 1 operations. Lead operation: Aladdin Studio Execute Data Cloud Query. Self-contained
    Naftiko capability covering one Aladdin Studio business surface.'
  tags:
  - Aladdin Studio
  - Queries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALADDIN_STUDIO_API_KEY: ALADDIN_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-cloud-queries
    baseUri: https://api.blackrock.com/adc/v1
    description: Aladdin Data Cloud API — Queries business capability. Self-contained, no shared references.
    resources:
    - name: connections-connectionId-query
      path: /connections/{connectionId}/query
      operations:
      - name: executequery
        method: POST
        description: Aladdin Studio Execute Data Cloud Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connectionId
          in: path
          type: string
          description: Data Cloud connection identifier
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ALADDIN_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-cloud-queries-rest
    port: 8080
    description: REST adapter for Aladdin Data Cloud API — Queries. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/connections/{connectionid}/query
      name: connections-connectionid-query
      description: REST surface for connections-connectionId-query.
      operations:
      - method: POST
        name: executequery
        description: Aladdin Studio Execute Data Cloud Query
        call: data-cloud-queries.executequery
        with:
          connectionId: rest.connectionId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-cloud-queries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aladdin Data Cloud API — Queries. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: aladdin-studio-execute-data-cloud
      description: Aladdin Studio Execute Data Cloud Query
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: data-cloud-queries.executequery
      with:
        connectionId: tools.connectionId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
