naftiko: 1.0.0-alpha2
info:
  label: Aladdin Graph API — Portfolios
  description: 'Aladdin Graph API — Portfolios. 2 operations. Lead operation: Aladdin Studio List Portfolios. Self-contained
    Naftiko capability covering one Aladdin Studio business surface.'
  tags:
  - Aladdin Studio
  - Portfolios
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALADDIN_STUDIO_API_KEY: ALADDIN_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: graph-portfolios
    baseUri: https://api.blackrock.com/v1
    description: Aladdin Graph API — Portfolios business capability. Self-contained, no shared references.
    resources:
    - name: portfolios
      path: /portfolios
      operations:
      - name: listportfolios
        method: GET
        description: Aladdin Studio List Portfolios
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: pageSize
          in: query
          type: integer
          description: Number of results per page
    - name: portfolios-portfolioId
      path: /portfolios/{portfolioId}
      operations:
      - name: getportfolio
        method: GET
        description: Aladdin Studio Get Portfolio
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: portfolioId
          in: path
          type: string
          description: Unique portfolio identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.ALADDIN_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: graph-portfolios-rest
    port: 8080
    description: REST adapter for Aladdin Graph API — Portfolios. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/portfolios
      name: portfolios
      description: REST surface for portfolios.
      operations:
      - method: GET
        name: listportfolios
        description: Aladdin Studio List Portfolios
        call: graph-portfolios.listportfolios
        with:
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/portfolios/{portfolioid}
      name: portfolios-portfolioid
      description: REST surface for portfolios-portfolioId.
      operations:
      - method: GET
        name: getportfolio
        description: Aladdin Studio Get Portfolio
        call: graph-portfolios.getportfolio
        with:
          portfolioId: rest.portfolioId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: graph-portfolios-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aladdin Graph API — Portfolios. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: aladdin-studio-list-portfolios
      description: Aladdin Studio List Portfolios
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-portfolios.listportfolios
      with:
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: aladdin-studio-get-portfolio
      description: Aladdin Studio Get Portfolio
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-portfolios.getportfolio
      with:
        portfolioId: tools.portfolioId
      outputParameters:
      - type: object
        mapping: $.
