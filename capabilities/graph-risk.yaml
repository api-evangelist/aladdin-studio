naftiko: 1.0.0-alpha2
info:
  label: Aladdin Graph API — Risk
  description: 'Aladdin Graph API — Risk. 1 operations. Lead operation: Aladdin Studio Get Portfolio Risk Analytics. Self-contained
    Naftiko capability covering one Aladdin Studio business surface.'
  tags:
  - Aladdin Studio
  - Risk
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALADDIN_STUDIO_API_KEY: ALADDIN_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: graph-risk
    baseUri: https://api.blackrock.com/v1
    description: Aladdin Graph API — Risk business capability. Self-contained, no shared references.
    resources:
    - name: portfolios-portfolioId-risk
      path: /portfolios/{portfolioId}/risk
      operations:
      - name: getportfoliorisk
        method: GET
        description: Aladdin Studio Get Portfolio Risk Analytics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: portfolioId
          in: path
          type: string
          description: Unique portfolio identifier
          required: true
        - name: asOfDate
          in: query
          type: string
          description: Risk calculation date in YYYY-MM-DD format
        - name: model
          in: query
          type: string
          description: Risk model to use for calculation
    authentication:
      type: bearer
      token: '{{env.ALADDIN_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: graph-risk-rest
    port: 8080
    description: REST adapter for Aladdin Graph API — Risk. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/portfolios/{portfolioid}/risk
      name: portfolios-portfolioid-risk
      description: REST surface for portfolios-portfolioId-risk.
      operations:
      - method: GET
        name: getportfoliorisk
        description: Aladdin Studio Get Portfolio Risk Analytics
        call: graph-risk.getportfoliorisk
        with:
          portfolioId: rest.portfolioId
          asOfDate: rest.asOfDate
          model: rest.model
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: graph-risk-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aladdin Graph API — Risk. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: aladdin-studio-get-portfolio-risk
      description: Aladdin Studio Get Portfolio Risk Analytics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-risk.getportfoliorisk
      with:
        portfolioId: tools.portfolioId
        asOfDate: tools.asOfDate
        model: tools.model
      outputParameters:
      - type: object
        mapping: $.
