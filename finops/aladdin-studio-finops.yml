specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Aladdin Studio
providerId: aladdin-studio
publisherName: BlackRock, Inc.
serviceCategory: Investment Management Platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial
  - Investment Management
  - Portfolio Analytics
  - Risk Management
  - Asset Management
  - BlackRock
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shell for BlackRock Aladdin Studio: enterprise contract billing with
  no public meter rates. Concrete meters and FOCUS values must be reconciled against the negotiated agreement
  for each client.'
sources:
  - https://www.blackrock.com/aladdin
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Aladdin Studio
  ServiceCategory: Investment Management Platform
  ProviderName: BlackRock
  PublisherName: BlackRock, Inc.
  InvoiceIssuerName: BlackRock, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: contract_subscription
    description: Annual contract value for the Aladdin engagement
    unit: contract-year
    aggregation: sum
    dimensions:
      - module
      - aum_band
  - name: api_calls
    description: API call volume across Aladdin module APIs (where contractually metered)
    unit: request
    aggregation: sum
    dimensions:
      - module
      - endpoint
  - name: seats
    description: Named user seats in the Aladdin platform
    unit: seat
    aggregation: max
    dimensions:
      - role
      - module
principles:
  - name: Visibility
    description: Aladdin invoicing and seat utilization are surfaced through BlackRock client services
      reports. API call volume reporting is negotiated per contract.
  - name: Allocation
    description: Allocate Aladdin contract spend to investment teams, fund families, and trading desks
      consuming each module.
  - name: Optimization
    description: Right-size seat counts and module subscriptions during annual renewals; consolidate redundant
      seats; review API integration footprint to drop unused module access.
  - name: Accountability
    description: Aladdin contracts are typically owned by the COO / CIO office; integrate the contracted
      spend into the firm's investment-platform budget review.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
