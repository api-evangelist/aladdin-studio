- type: Features
  data:
  - name: Portfolio Data Access
    description: Retrieve comprehensive portfolio data including positions, holdings, securities, and performance metrics
      across asset classes.
  - name: Risk Analytics
    description: Access Aladdin's institutional-grade risk analytics including factor exposures, VaR, scenario analysis, and
      stress testing across public and private markets.
  - name: Aladdin Data Cloud
    description: Snowflake-based data warehousing providing access to large-scale portfolio analytics with OAuth and JWT authentication
      supporting both Snowflake connectors and Snowpark.
  - name: Trading Integration
    description: Order management and trading workflow APIs enabling integration with Aladdin's trading platform for order
      creation, tracking, and execution.
  - name: Investment Research Access
    description: APIs for accessing investment research data, analyst insights, and quantitative analytics built on Aladdin's
      data infrastructure.
  - name: Long-Running Operations
    description: Support for long-running operation (LRO) patterns with configurable polling, enabling asynchronous processing
      of computationally intensive analytics requests.
  - name: Batch Processing
    description: Batch API support with sequential and parallel execution capabilities for processing large volumes of portfolio
      data operations efficiently.
  - name: Multi-Auth Support
    description: Flexible authentication supporting Basic Auth with API tokens, OAuth client credentials flow, OAuth refresh
      token flow, and Snowflake JWT for Data Cloud access.
  - name: Plugin Architecture
    description: Extensible SDK plugin architecture enabling domain-specific packages (trading, investment research) built
      on top of the core AladdinSDK.
  - name: Jupyter Notebook Integration
    description: Downloadable Python Jupyter Notebooks and code samples in multiple languages for rapid solution development
      and prototyping.
- type: UseCases
  data:
  - name: Custom Portfolio Analytics
    description: Build bespoke portfolio analysis tools using Aladdin's risk and performance data to generate custom insights
      for investment teams.
  - name: Automated Risk Reporting
    description: Automate generation of risk reports, factor exposure summaries, and stress test results using Aladdin's risk
      analytics APIs.
  - name: Trading Workflow Automation
    description: Integrate Aladdin trading data into proprietary order management systems and automate trading workflow processes.
  - name: Investment Research Integration
    description: Connect internal research platforms to Aladdin's investment research data for unified analyst workflow tooling.
  - name: Data Science and Quantitative Research
    description: Access Aladdin Data Cloud from Snowflake-based data science environments for quantitative model development
      and backtesting.
  - name: Client Reporting Automation
    description: Build automated client reporting solutions pulling portfolio performance, risk, and holdings data from Aladdin
      APIs.
  - name: Multi-Asset Class Analytics
    description: Analyze portfolios across public equities, fixed income, alternatives, and private markets using Aladdin's
      unified data platform.
- type: Integrations
  data:
  - name: Snowflake
    description: Native Aladdin Data Cloud integration with Snowflake for large-scale analytics, supporting both standard
      connectors and Snowpark for Python-based data science workflows.
  - name: Amazon Web Services
    description: Aladdin available on AWS infrastructure (general availability expected second half of 2026) complementing
      existing Azure deployment.
  - name: Microsoft Azure
    description: Primary cloud infrastructure for Aladdin platform, supporting enterprise deployments across institutional
      clients.
  - name: Preqin
    description: Private markets data integrated into Aladdin ecosystem following BlackRock's acquisition for alternatives
      and private market analytics.
  - name: Python Ecosystem
    description: First-class Python support via AladdinSDK on PyPI, with Jupyter Notebook examples and plugin architecture
      for domain extensions.
  - name: RepRisk
    description: ESG risk data integrated into Aladdin portfolio management for reputational and environmental risk analysis.
