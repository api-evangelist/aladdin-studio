description: BlackRock Aladdin APIs are gated to contracted institutional clients; rate limits are not
  publicly published. Per-tenant throughput is determined contractually and managed by BlackRock's Aladdin
  client services team.
sources:
  - https://www.blackrock.com/aladdin
notes: No public rate-limit documentation. Replace with negotiated rate-limit terms once available from
  a specific Aladdin engagement.
responseCodes:
  throttled: 429
limits:
  - name: Negotiated Throughput
    scope: contract
    metric: varies
    limit: per-contract; not publicly documented
policies:
  - name: Contractual Limits
    description: Throughput, concurrency, and quota are dimensioned during the Aladdin contract negotiation
      and managed by BlackRock client services.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter and honor any Retry-After header
      returned by Aladdin endpoints.
