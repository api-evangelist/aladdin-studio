description: BlackRock Aladdin Studio is a private enterprise platform for institutional investment-management
  clients. Pricing is contract-only and not published publicly. Aladdin client engagements are negotiated
  by BlackRock with custom commercial terms based on AUM, modules used, seat counts, and integration scope.
sources:
  - https://www.blackrock.com/aladdin
notes: No public pricing surface. Plans below are placeholder contract shells; replace with negotiated
  contract terms when documented for a specific client deployment.
plans:
  - id: aladdin-studio-enterprise
    name: Enterprise Contract
    type: enterprise
    description: Custom-negotiated Aladdin Studio engagement covering Aladdin Graph, Aladdin Data Cloud,
      Aladdin Trading, and Aladdin Investment Research APIs. Pricing is bespoke per client.
    entries:
      - label: API Access
        description: Negotiated API access volume - typical Aladdin contracts include integration to one
          or more Aladdin module APIs
        name: api_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Aladdin Graph API
      - name: Aladdin Data Cloud API
      - name: Aladdin Trading API
      - name: Aladdin Investment Research API
      - name: Dedicated Account Manager
      - name: Contractual SLA
      - name: Security & Compliance Review
